<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Serviços oferecidos pela Vortex Motors - Troca de peças, pontos de carregamento e entrega rápida" />
    
    <title>VORTEX MOTORS - Serviços</title>
    
    <link rel="stylesheet" href="/public/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header" role="banner">
      <div class="header__logo">
        <a href="/index.html" aria-label="Vortex Motors - Página inicial">
          <img src="/public/images/LOGO.png" alt="Logo Vortex Motors" width="290" height="auto" />
        </a>
      </div>

      <nav class="navbar" role="navigation" aria-label="Menu principal">
        <div class="navbar__links">
          <a href="/index.html" class="navbar__link">Home</a>
          <a href="/pages/about/sobre.html" class="navbar__link">Sobre</a>
          <a href="/pages/equipe/equipe.html" class="navbar__link">Equipe</a>
          <a href="/pages/auth/login.html" class="navbar__link">Login</a>
          <a href="/pages/contact/contato.html" class="navbar__link">Contato</a>
        </div>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main id="main-content">
      <section class="cards__con tainer" aria-labelledby="services-title">
        <h1 id="services-title" class="cards__title">Serviços</h1>
        
      <div class="cards__container">
        <div class="card">
          <img 
            src="/public/images/pecas.png" 
            alt="Ícone de troca de peças" 
            class="card__image"
            width="120"
          />
          <h2 class="card__title">TROCA DE PEÇAS</h2>
          <a href="/pages/services/troca_pecas.html">
            <button type="button" class="card__button">SELECIONAR</button>
          </a>
        </div>

        <div class="card">
          <img 
            src="/public/images/carregando.png" 
            alt="Ícone de ponto de carregamento" 
            class="card__image"
            width="120"
          />
          <h2 class="card__title">PONTOS DE <n>RECARGA</h2>
          <a href="/pages/services/carregamento.html">
            <button type="button" class="card__button">SELECIONAR</button>
          </a>
        </div>

        <div class="card">
          <img 
            src="/public/images/entrega.png" 
            alt="Ícone de entrega rápida" 
            class="card__image"
            width="120"
          />
          <h2 class="card__title">ENTREGA RÁPIDA</h2>
          <a href="/pages/services/entrega_rapida.html">
            <button type="button" class="card__button">SELECIONAR</button>
          </a>
        </div>
      </div>
      </section>
    </main>

    <!-- WHATSAPP FLOAT -->
    <a 
      href="https://wa.me/5511984039699" 
      class="whatsapp-float" 
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Fale conosco pelo WhatsApp"
    >
      <img 
        src="/public/images/whatsapp.png" 
        alt="Ícone WhatsApp" 
        class="whatsapp-float__icon"
        width="60"
        height="60"
      />
    </a>
  </body>
</html>
