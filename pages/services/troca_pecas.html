<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Formulário para troca de peças - Vortex Motors" />

    <title>VORTEX MOTORS - Troca de Peças</title>

    <link rel="stylesheet" href="/public/css/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header" role="banner">
      <div class="header__logo">
        <a href="/index.html" aria-label="Vortex Motors - Página inicial">
          <img src="/img/LOGO.png" alt="Logo Vortex Motors" width="290" height="auto" />
        </a>
      </div>

      <nav class="navbar" role="navigation" aria-label="Menu principal">
        <div class="navbar__links">
          <a href="/index.html" class="navbar__link">Home</a>
          <a href="/pages/about/sobre.html" class="navbar__link">Sobre</a>
          <a href="/pages/equipe/equipe.html" class="navbar__link">Equipe</a>
          <a href="/pages/auth/login.html" class="navbar__link">Login</a>
          <a href="/pages/contact/contato.html" class="navbar__link">Contato</a>
        </div>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main id="main-content">
      <section class="content-section" aria-labelledby="troca-pecas-title">
        <h1 id="troca-pecas-title">Troca de Peças</h1>

        <form class="service-form" data-validate aria-label="Formulário de troca de peças">
          <!-- Tipo de Peça -->
          <label for="tipo-peca">Tipo de Peça:</label>
          <select id="tipo-peca" name="tipo-peca" class="service-form__select" required aria-required="true">
            <option value="">Selecione</option>
            <option value="bateria">Bateria</option>
            <option value="motor-eletrico">Motor Elétrico</option>
            <option value="inversor">Inversor</option>
            <option value="carregador">Carregador</option>
            <option value="sistema-freio">Sistema de Freio</option>
            <option value="suspensao">Suspensão</option>
            <option value="outro">Outro</option>
          </select>

          <!-- Modelo do Veículo -->
          <label for="modelo-veiculo">Modelo do Veículo:</label>
          <input
            type="text"
            id="modelo-veiculo"
            name="modelo-veiculo"
            class="service-form__input"
            placeholder="Ex: Tesla Model 3, BYD Dolphin..."
            required
            aria-required="true"
          />

          <!-- Tipo de Serviço -->
          <label>Tipo de Serviço:</label>
          <div class="service-form__options" role="radiogroup" aria-label="Tipo de serviço">
            <label>
              <input type="radio" name="tipo-servico" value="compra" required aria-required="true" />
              Apenas compra da peça
            </label>
            <label>
              <input type="radio" name="tipo-servico" value="compra-instalacao" />
              Compra + instalação (manutenção)
            </label>
          </div>

          <!-- Observações -->
          <label for="observacoes">Observações:</label>
          <textarea
            id="observacoes"
            name="observacoes"
            class="service-form__textarea"
            placeholder="Descreva mais detalhes se necessário..."
            rows="4"
          ></textarea>

          <!-- Botão -->
          <button type="submit" class="btn btn--submit">Solicitar Orçamento</button>
        </form>
      </section>
    </main>

    <!-- WHATSAPP FLOAT -->
    <a
      href="https://wa.me/5511984039699"
      class="whatsapp-float"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Fale conosco pelo WhatsApp"
    >
      <img
        src="/img/whatsapp.png"
        alt="Ícone WhatsApp"
        class="whatsapp-float__icon"
        width="60"
        height="60"
      />
    </a>

    <!-- FOOTER -->
    <footer class="footer" role="contentinfo">
      <p>&copy; 2026 Vortex Motors. Todos os direitos reservados.</p>
    </footer>

    <!-- Scripts -->
    <script src="/public/js/form-validation.js" defer></script>
  </body>
</html>
