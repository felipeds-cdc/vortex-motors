<body>
    <!--------------------HEADER------------------------->
    <header>
        <div class="logo">
            <img src="img/LOGO.png" alt="Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="sobre.html">Sobre</a>

    <!--------------------HEADER------------------------->

    <section class="troca-peca">

        <h2> TROCA DE PEÇAS </h2>

        <form>

            <!-- Tipo de peça -->
            <label>Tipo de Peça:</label>
            <select required>
                <option value="">Selecione</option>
                <option>Bateria</option>
                <option>Motor Elétrico</option>
                <option>Inversor</option>
                <option>Carregador</option>
                <option>Sistema de Freio</option>
                <option>Suspensão</option>
                <option>Outro</option>
            </select>

            <!-- Modelo do carro -->
            <label>Modelo do Veículo:</label>
            <input type="text" placeholder="Ex: Tesla Model 3, BYD Dolphin..." required>

            <!-- Tipo de serviço -->
            <label>Tipo de Serviço:</label>

            <div class="opcoes">
                <label>
                    <input type="radio" name="servico" required>
                    Apenas compra da peça
                </label>

                <label>
                    <input type="radio" name="servico">
                    Compra + instalação (manutenção)
                </label>
            </div>

            <!-- Observações -->
            <label>Observações:</label>
            <textarea placeholder="Descreva mais detalhes se necessário..."></textarea>

            <!-- Botão -->
            <button type="submit">Solicitar Orçamento</button>

        </form>

    </section>
